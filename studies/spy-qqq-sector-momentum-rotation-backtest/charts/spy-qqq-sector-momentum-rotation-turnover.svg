<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Rotation Turnover</title>
  <desc id="desc">Base-case total turnover and rebalance count, 5 bps cost scenario</desc>
  <style>
    text { font-family: Inter, Arial, sans-serif; fill: #0f172a; }
    .title { font-size: 20px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .axis { font-size: 12px; fill: #64748b; }
    .legend { font-size: 13px; fill: #0f172a; }
    .bar-label { font-size: 13px; fill: #0f172a; font-weight: 600; }
  </style>
  <rect width="960" height="520" fill="#ffffff" />
  <text x="78" y="28" class="title">Rotation Turnover</text>
  <text x="78" y="48" class="subtitle">Base-case total turnover and rebalance count, 5 bps cost scenario</text>
  <rect x="210" y="112" width="520" height="190" fill="#ffffff" stroke="#e2e8f0" />
<line x1="210.0" x2="210.0" y1="112" y2="302" stroke="#e2e8f0" />
<text x="210.0" y="330" text-anchor="middle" class="axis">0</text>
<line x1="340.0" x2="340.0" y1="112" y2="302" stroke="#e2e8f0" />
<text x="340.0" y="330" text-anchor="middle" class="axis">69</text>
<line x1="470.0" x2="470.0" y1="112" y2="302" stroke="#e2e8f0" />
<text x="470.0" y="330" text-anchor="middle" class="axis">138</text>
<line x1="600.0" x2="600.0" y1="112" y2="302" stroke="#e2e8f0" />
<text x="600.0" y="330" text-anchor="middle" class="axis">206</text>
<line x1="730.0" x2="730.0" y1="112" y2="302" stroke="#e2e8f0" />
<text x="730.0" y="330" text-anchor="middle" class="axis">275</text>
<text x="192" y="173" text-anchor="end" class="bar-label">Top 1 momentum</text>
<rect x="210" y="144" width="520.0" height="46" fill="#0f766e" opacity="0.88" />
<text x="760" y="162" class="bar-label">275.0 turnover</text>
<text x="760" y="182" class="subtitle">138 rebalances</text>
<text x="192" y="265" text-anchor="end" class="bar-label">Top 3 momentum</text>
<rect x="210" y="236" width="364.9" height="46" fill="#2563eb" opacity="0.88" />
<text x="760" y="254" class="bar-label">193.0 turnover</text>
<text x="760" y="274" class="subtitle">223 rebalances</text>
<text x="78" y="438" class="subtitle">Turnover is the sum of absolute portfolio-weight changes. Full 100% ETF-to-ETF switches count as 2.0.</text>
</svg>
